<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — كفاية المؤمن</title>
<link rel="icon" href="/icons/icon-72x72.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Tajawal',sans-serif;background:#080f0b;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Amiri&display=swap');
  .wrap{max-width:480px}
  .icon{font-size:80px;margin-bottom:24px;opacity:.7}
  h1{font-size:80px;font-weight:900;color:#0d8f58;line-height:1}
  h2{font-family:'Amiri',serif;font-size:28px;margin:16px 0 12px;color:#e8c86a}
  p{color:rgba(255,255,255,.5);font-size:15px;line-height:1.8;margin-bottom:32px}
  a{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#0d8f58,#063d25);color:#fff;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 20px rgba(11,107,66,.4)}
  a:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(11,107,66,.6)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🕌</div>
  <h1>404</h1>
  <h2>الصفحة غير موجودة</h2>
  <p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
  <a href="/">← العودة للرئيسية</a>
</div>
</body>
</html>
