<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كفاية المؤمن</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* كل الـ CSS القديم موجود هنا (لم أغيّره إلا القليل) */
.ic{display:inline-flex;align-items:center;justify-content:center;font-style:normal;line-height:1;font-size:1em;vertical-align:middle;}
/* ... (كل الـ CSS من الملف الأصلي يبقى كما هو) ... */
:root{--em:#0b6b42;--em2:#0d8f58;--em3:#10b870;--gold:#c9a84c;--bg:#f7f4ed;--card:#ffffff;--text:#1a1610;}
[data-theme="dark"]{--bg:#080f0b;--card:#0e1a12;--text:#f0f4f0;}

/* إضافات جديدة للمشغل */
.floating-player{position:fixed;bottom:0;right:0;left:0;z-index:150;background:rgba(8,15,11,0.96);backdrop-filter:blur(20px);border-top:1px solid rgba(11,107,66,0.3);padding:12px 24px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -10px 40px rgba(0,0,0,0.4);}
.floating-player.visible{transform:translateY(0);}
.player-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;}
.player-info{display:flex;align-items:center;gap:12px;}
.player-thumb{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--em2),var(--em-dark));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.player-title{font-size:14px;font-weight:700;color:white;margin-bottom:2px;}
.player-sheikh{font-size:12px;color:rgba(255,255,255,0.5);}
.player-controls{display:flex;align-items:center;gap:12px;flex-direction:column;}
.player-btns{display:flex;align-items:center;gap:8px;}
.player-btn{background:none;border:none;color:rgba(255,255,255,0.6);font-size:18px;cursor:pointer;transition:color .2s;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.player-btn:hover{color:white;}
.player-btn-main{width:46px;height:46px;border-radius:50%;background:var(--em2);color:white;font-size:18px;box-shadow:0 4px 15px rgba(11,107,66,0.4);}
.waveform-container{background:rgba(255,255,255,0.05);border-radius:12px;padding:6px;width:420px;}
.speed-select{background:rgba(255,255,255,0.1);color:white;border:none;border-radius:8px;padding:4px 8px;font-size:12px;}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--em3),var(--gold2));border-radius:2px;transition:width .2s linear;}
.player-right{display:flex;align-items:center;justify-content:flex-end;gap:10px;}
.player-close{background:none;border:none;color:rgba(255,255,255,0.4);font-size:16px;cursor:pointer;}
</style>
</head>
<body>

<!-- NAV + MOBILE NAV + PAGES (كلها كما هي من الملف الأصلي) -->
<!-- ... (كل محتوى الصفحات حتى قبل FLOATING PLAYER) ... -->

<!-- FLOATING PLAYER - النسخة الجديدة -->
<div class="floating-player" id="floating-player">
  <div class="player-inner">
    <div class="player-info">
      <div class="player-thumb" id="player-thumb">🎙</div>
      <div>
        <div class="player-title" id="player-title">شرح الأربعين النووية — الحديث الأول</div>
        <div class="player-sheikh" id="player-sheikh">الشيخ حسام دياب</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="player-btns">
        <button class="player-btn" onclick="seekRelative(-10)" title="رجوع 10 ثواني">⏪</button>
        <button class="player-btn player-btn-main" id="player-play-main" onclick="togglePlay()">
          <span class="ic" id="play-icon">▶</span>
        </button>
        <button class="player-btn" onclick="seekRelative(10)" title="تقديم 10 ثواني">⏩</button>
      </div>

      <div class="waveform-container">
        <canvas id="waveform-canvas" width="420" height="50"></canvas>
      </div>

      <div class="player-progress">
        <span class="player-time" id="p-cur">00:00</span>
        <div class="progress-bar" onclick="seekAudioFloat(event)">
          <div class="progress-fill" id="p-fill"></div>
        </div>
        <span class="player-time" id="p-total">00:00</span>
      </div>

      <select id="speed-select" onchange="changeSpeed(this.value)" class="speed-select">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>

    <div class="player-right">
      <button class="player-close" onclick="closePlayer()">✕</button>
    </div>
  </div>
</div>

<!-- FOOTER + TOAST (كما هي) -->

<script>
// كل الـ script القديم (Supabase + Prayer + Tasbih + Search + ...)
// ثم نستبدل قسم PLAYER بالكود الجديد

// ══ PLAYER جديد فاخر 2026 ══
let currentAudio = new Audio();
let isPlaying = false;
let animationFrame;
let audioContext, analyser, source, dataArray, canvas, ctx;

const waveformCanvas = document.getElementById('waveform-canvas');
if (waveformCanvas) {
  canvas = waveformCanvas;
  ctx = canvas.getContext('2d');
}

function initAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 64;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
  }
}

function loadAndPlay(url, title, sheikh) {
  currentAudio.src = url;
  currentAudio.load();
  document.getElementById('player-title').textContent = title;
  document.getElementById('player-sheikh').textContent = sheikh;
  showPlayer();
  currentAudio.onloadedmetadata = () => {
    document.getElementById('p-total').textContent = formatTime(currentAudio.duration);
  };
  currentAudio.ontimeupdate = updateProgress;
  currentAudio.onended = () => { isPlaying = false; updatePlayIcon(); stopWaveform(); };
  togglePlay();
}

function togglePlay() {
  if (!currentAudio.src) return;
  if (isPlaying) {
    currentAudio.pause();
    stopWaveform();
  } else {
    currentAudio.play().then(() => { initAudioContext(); startWaveform(); });
  }
  isPlaying = !isPlaying;
  updatePlayIcon();
}

function updatePlayIcon() {
  document.getElementById('play-icon').textContent = isPlaying ? '❚❚' : '▶';
}

function seekRelative(seconds) {
  if (!currentAudio.src) return;
  currentAudio.currentTime = Math.max(0, Math.min(currentAudio.duration || 0, currentAudio.currentTime + seconds));
}

function seekAudioFloat(e) {
  const bar = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  currentAudio.currentTime = percent * (currentAudio.duration || 0);
}

function changeSpeed(speed) {
  currentAudio.playbackRate = parseFloat(speed);
}

function formatTime(seconds) {
  if (!seconds) return '00:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function updateProgress() {
  if (!currentAudio.duration) return;
  const percent = (currentAudio.currentTime / currentAudio.duration) * 100;
  document.getElementById('p-fill').style.width = percent + '%';
  document.getElementById('p-cur').textContent = formatTime(currentAudio.currentTime);
}

function startWaveform() {
  source = audioContext.createMediaElementSource(currentAudio);
  source.connect(analyser);
  analyser.connect(audioContext.destination);

  function draw() {
    animationFrame = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const barWidth = canvas.width / dataArray.length * 2.8;
    let x = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const barHeight = (dataArray[i] / 255) * canvas.height * 0.85;
      ctx.fillStyle = isPlaying ? '#10b870' : '#555';
      ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
      x += barWidth + 3;
    }
  }
  draw();
}

function stopWaveform() {
  cancelAnimationFrame(animationFrame);
  if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function showPlayer() {
  document.getElementById('floating-player').classList.add('visible');
}

function closePlayer() {
  currentAudio.pause();
  isPlaying = false;
  stopWaveform();
  document.getElementById('floating-player').classList.remove('visible');
}

// دالة التشغيل العامة (تُستدعى من الأزرار)
window.playAudio = function(id, title, sheikh) {
  // هنا يمكنك توسيعها لاحقاً بجلب URL من Supabase
  // حالياً للاختبار:
  loadAndPlay('https://qfmsplotijbnwderzbkv.supabase.co/storage/v1/object/public/audios/test.mp3', title || 'درس تجريبي', sheikh || 'الشيخ حسام دياب');
};

// ══ باقي الـ script (Supabase + Prayer + Tasbih + ...) كما هو تماماً من الملف الأصلي ══
// (انسخ كل الـ script من السطر 2500 تقريباً حتى النهاية كما هو)

</script>
</body>
</html>
