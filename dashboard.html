const SUPABASE_URL = 'https://qfmsplotijbnwderzbkv.supabase.co';

// ════════════════════════════════════════
//  PLAY AUDIO → يفتح المشغل الجديد في الموقع الرئيسي
// ════════════════════════════════════════
window.playAudio = function(id, title, sheikh) {
  // افتح الموقع الرئيسي في تبويب جديد وشغّل الصوت
  const mainSite = window.open('index.html', '_blank');
  mainSite.onload = () => {
    mainSite.postMessage({action:'playAudio', id:id, title:title, sheikh:sheikh}, '*');
  };
};

// ════════════════════════════════════════
//  UPLOAD FUNCTIONS (محدثة مع Progress أفضل)
// ════════════════════════════════════════
async function uploadWithProgress(file, bucket, folder = '') {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const filename = `${folder ? folder+'/' : ''}${Date.now()}_${file.name}`;
    const url = `${SUPABASE_URL}/storage/v1/object/${bucket}/${filename}`;

    xhr.open('POST', url);
    xhr.setRequestHeader('apikey', SERVICE_ROLE_KEY);
    xhr.setRequestHeader('Authorization', `Bearer ${SERVICE_ROLE_KEY}`);
    xhr.setRequestHeader('x-upsert', 'true');

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        document.getElementById('upload-progress-bar').style.width = pct + '%';
        document.getElementById('upload-pct').textContent = pct + '%';
      }
    };

    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        resolve(`${SUPABASE_URL}/storage/v1/object/public/${bucket}/${filename}`);
      } else reject(new Error('فشل الرفع: ' + xhr.status));
    };
    xhr.onerror = () => reject(new Error('خطأ في الاتصال'));
    xhr.send(file);
  });
}
