// ────────────────────────────────────────────────
//          دوال الاتصال (تستخدم SERVICE_ROLE_KEY)
// ────────────────────────────────────────────────

async function supabaseFetch(endpoint, options = {}) {
  const headers = {
    'apikey': SERVICE_ROLE_KEY,
    'Authorization': `Bearer ${SERVICE_ROLE_KEY}`,
    'Content-Type': 'application/json',
  };

  const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase error ${res.status}: ${err}`);
  }
  return res.json();
}

async function dbQuery(table, params = {}) {
  let query = `?`;
  if (params.select)    query += `select=${params.select}&`;
  if (params.filter)    query += `${params.filter}&`;
  if (params.order)     query += `order=${params.order}&`;
  if (params.limit)     query += `limit=${params.limit}&`;

  return supabaseFetch(table + query);
}

async function dbInsert(table, data) {
  return supabaseFetch(table, {
    method: 'POST',
    body: JSON.stringify(data),
  });
}

async function dbUpdate(table, id, data) {
  return supabaseFetch(`${table}?id=eq.${id}`, {
    method: 'PATCH',
    body: JSON.stringify(data),
  });
}
